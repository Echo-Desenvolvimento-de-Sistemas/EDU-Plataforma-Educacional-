version: '3.8'

services:
  app:
    image: edu-plataforma-educacional:latest
    ports:
      - "8080:80"
    env_file:
      - .env
    networks:
      - echonet
    volumes:
      - demo_storage_data:/var/www/html/storage/app
      - demo_cache_data:/var/www/html/bootstrap/cache
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 120s
      update_config:
        parallelism: 1
        delay: 10s
        order: stop-first
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.edu-app.rule=Host(`edu.echo.dev.br`)"
        - "traefik.http.routers.edu-app.entrypoints=websecure"
        - "traefik.http.routers.edu-app.tls.certresolver=myresolver"
        - "traefik.http.services.edu-app.loadbalancer.server.port=80"
        # WebSocket support for Reverb
        - "traefik.http.routers.edu-ws_demo.rule=Host(`edu.echo.dev.br`) && PathPrefix(`/app`)"
        - "traefik.http.routers.edu-ws_demo.entrypoints=websecure"
        - "traefik.http.routers.edu-ws_demo.tls.certresolver=myresolver"

  redis:
    image: redis:7-alpine
    networks:
      - echonet
    volumes:
      - demo_redis_data:/data
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
    command: redis-server --appendonly yes
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  demo_storage_data:
    driver: local
  demo_cache_data:
    driver: local
  demo_redis_data:
    driver: local

networks:
  echonet:
    external: true
